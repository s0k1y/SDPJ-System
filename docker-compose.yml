services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sdpj-backend
    ports:
      - "8000:8000"
    environment:
      - DB_URL=sqlite+aiosqlite:///./data/sdpj.db
      - LOG_DIR=/app/data/logs
      - SESSION_HTTPS_ONLY=false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sdpj-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
