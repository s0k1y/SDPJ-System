version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: sdpj-backend
    ports:
      - "8000:8000"
    environment:
      - SAMPLE_DB_URL=sqlite+aiosqlite:///./data/db/sample.db
      - RESULT_DB_URL=sqlite+aiosqlite:///./data/db/result.db
      - USER_DB_URL=sqlite+aiosqlite:///./data/db/user.db
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sdpj-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
